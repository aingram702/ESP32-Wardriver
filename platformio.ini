; ============================================================================
;  ESP32-S3 Wardriver - PlatformIO project configuration
;  Target board: ESP32-S3-DevKitC-1  (N16R8 = 16 MB flash, 8 MB octal PSRAM)
; ============================================================================
[platformio]
default_envs = esp32s3_wardriver

[env:esp32s3_wardriver]
platform  = espressif32@^6.7.0
board     = esp32-s3-devkitc-1
framework = arduino

; --- N16R8 specifics: 16 MB flash + 8 MB octal (OPI) PSRAM ------------------
board_build.arduino.memory_type = qio_opi
board_build.flash_mode          = qio
board_upload.flash_size         = 16MB
board_upload.maximum_size       = 16777216
board_build.partitions          = partitions.csv
board_build.filesystem          = littlefs

; --- Serial / upload --------------------------------------------------------
monitor_speed = 115200
upload_speed  = 921600

; --- Compile flags ----------------------------------------------------------
build_flags =
    -DBOARD_HAS_PSRAM
    ; Serial monitor goes to the CP2102 "UART" port (the one most people plug
    ; into). If you use the board's native "USB" port instead, change this to 1.
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=2
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DCONFIG_ASYNC_TCP_USE_WDT=0

; --- Library dependencies ---------------------------------------------------
; NOTE: Bluetooth/NimBLE is intentionally NOT here. This board still runs WiFi
; only. The companion ESP32-BlueDriver does the BLE scanning and POSTs its finds
; here over WiFi (see src/BlueLink.* and the /ingest endpoint), so the WiFi/BT
; coexistence problem that destabilised this board's SoftAP never arises.
; ArduinoJson is used to parse the BlueDriver ingest payload.
lib_deps =
    esp32async/AsyncTCP @ ^3.3.2
    esp32async/ESPAsyncWebServer @ ^3.6.0
    mikalhart/TinyGPSPlus @ ^1.1.0
    bblanchon/ArduinoJson @ ^7.2.0
